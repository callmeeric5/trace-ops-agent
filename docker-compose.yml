services:
  # --- Sentinel-Ops Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/sentinel_ops.db
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
